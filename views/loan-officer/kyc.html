<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>KYC Verification</title>
</head>
<body>
    <nav class="sidebar">
        <div class="brand">SecureBank</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="applications.html" class="nav-link">Loan Applications</a></li>
            <li class="nav-item"><a href="kyc.html" class="nav-link active">KYC Verification</a></li>
            <li class="nav-item"><a href="customer.html" class="nav-link">Customer Details</a></li>
        </ul>
    </nav>

    <main class="content">
        <header>
            <h1>KYC Verification</h1>
            <div class="user-profile">
                <div style="text-align: right">
                    <div style="font-weight: bold">Sarah Johnson</div>
                    <div style="font-size: 12px; color: gray">Loan Officer</div>
                </div>
                <img src="https://ui-avatars.com/api/?name=Sarah+Johnson" alt="Profile">

        <div class="card">

                <h3>Pending Verifications</h3>

            <table>
                <thead>
                    <tr>
                        <th>Customer ID</th>
                        <th>Name</th>
                        <th>PAN Number</th>
                        <th>Aadhaar Number</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>CUST-9921</td>
                        <td>Amit Patel</td>
                        <td>ABCDE1234F</td>
                        <td>xxxx-xxxx-9012</td>
                        <td><span class="badge">Pending</span></td>
                        <td>
                            <button class="btn btn-approve">Verify</button>
                            <button class="btn btn-reject">Reject</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</html>
