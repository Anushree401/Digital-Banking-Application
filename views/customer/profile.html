<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Customer Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="logo">
                <h1>BrokeBank</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName">Broke Guy</span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <nav class="sidebar">
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html">Dashboard</a></li>
            <li class="nav-item"><a href="accounts.html">Accounts</a></li>
            <li class="nav-item"><a href="transactions.html">Transactions</a></li>
            <li class="nav-item"><a href="cards.html">Cards</a></li>
            <li class="nav-item"><a href="loans.html">Loans</a></li>
            <li class="nav-item"><a href="fixed-deposits.html">Fixed Deposits</a></li>
            <li class="nav-item"><a href="investments.html">Investments</a></li>
            <li class="nav-item active"><a href="profile.html">Profile</a></li>
            <li class="nav-item"><a href="support.html">Support</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <div class="dashboard-container">
            <section class="welcome-section">
                <h2>My Profile</h2>
                <p class="date">Manage your personal information</p>
            </section>

            <section class="accounts-overview">
                <h3>Personal Information</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter full name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Enter email">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="Enter phone number">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address" placeholder="Enter address"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Update Profile</button>
                </form>
            </section>

            <section class="accounts-overview">
                <h3>Change Password</h3>
                <form id="passwordForm">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter current password">
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password">
                    </div>
                    <button type="submit" class="btn-primary">Change Password</button>
                </form>
            </section>
        </div>
    </main>
    <footer class="footer">
        <p>&copy; 2026 Digital Banking Application. All rights reserved.</p>
    </footer>
    <script src="../../middleware/shared/main.js"></script>
    <script src="../../middleware/customer/profile.js"></script>
</body>
</html>
